, "#16a085", "#c0392b"]; const NS_SVG = "http://www.w3.org/2000/svg"; const TICK_SCORE_STEP_SUBJECTS = 25; const TICK_SCORE_STEP_SUMMARY = 150; const SCORE_HIGHLIGHT_RATIO = 0.8; const COLOR_SCORE_HIGHLIGHT = "#FF3333"; const DEFAULT_NAME = "姜人文"; let records = []; let namesOrder = [], examsOrder = [], byNameExam = {}; let sortState = { key: KEY_TOTAL_CLASS_RANK, order: "asc" }; function init() { DATA_BASE.forEach((r) => { r[KEY_TOTAL] = SUBJECTS.reduce((sum, s) => sum + (r[s] || 0), 0); }); records = DATA_BASE.map((r) => ({ ...r })); namesOrder = [...new Set(records.map((r) => r[KEY_NAME]))]; examsOrder = [...new Set(records.map((r) => r[KEY_EXAM]))]; examsOrder.forEach((ex) => { const list = records .filter((r) => r[KEY_EXAM] === ex) .sort((a, b) => b[KEY_TOTAL] - a[KEY_TOTAL]); list.forEach((r, i) => (r[KEY_TOTAL_CLASS_RANK] = i + 1)); }); byNameExam = records.reduce((acc, r) => { if (!acc[r[KEY_NAME]]) acc[r[KEY_NAME]] = {}; acc[r[KEY_NAME]][r[KEY_EXAM]] = r; return acc; }, {}); const nSel = document.getElementById("nameSelect"), eSel = document.getElementById("examSelect"); nSel.innerHTML = namesOrder .map((n) => `<option value="${n}">${n}</option>`) .join(""); eSel.innerHTML = examsOrder .map((e) => `<option value="${e}">${e}</option>`) .join(""); nSel.value = namesOrder.includes(DEFAULT_NAME) ? DEFAULT_NAME : namesOrder[0]; nSel.onchange = eSel.onchange = () => { renderTable(); renderChart(); }; document.getElementById("rotateBtn").onclick = () => { document.documentElement.classList.toggle("landscape-mode"); renderChart(); }; window.onresize = renderChart; renderTable(); renderChart(); } function renderTable() { const name = document.getElementById("nameSelect").value, exam = document.getElementById("examSelect").value; const header = document.getElementById("tableHeaderRow"), body = document.getElementById("tableBody"); header.innerHTML = TABLE_COLUMNS.map( (c) => `<th onclick="resort('${c}')" style="cursor:pointer">${c}${sortState.key === c ? (sortState.order === "asc" ? "▲" : "▼") : ""}</th>`, ).join(""); let filtered = records .filter((r) => r[KEY_EXAM] === exam) .sort((a, b) => { let v1 = a[sortState.key], v2 = b[sortState.key]; const res = typeof v1 === "number" && typeof v2 === "number" ? v1 - v2 : String(v1).localeCompare(String(v2), "zh-Hans"); return sortState.order === "asc" ? res : -res; }); body.innerHTML = filtered .map( (r, i) => `<tr class="${r[KEY_NAME] === name ? "row-highlight" : ""}">${TABLE_COLUMNS.map((c) => `<td>${c === "序号" ? i + 1 : (r[c] ?? "")}</td>`).join("")}</tr>`, ) .join(""); } function resort(key) { if (sortState.key === key) sortState.order = sortState.order === "asc" ? "desc" : "asc"; else { sortState.key = key; sortState.order = "asc"; } renderTable(); } function renderChart() { const name = document.getElementById("nameSelect").value; const examsForName = Object.keys(byNameExam[name] || {}); const containerScores = document.getElementById("chartScores"); const containerSummary = document.getElementById("chartSummary"); drawBarChart( containerScores, `${name} - 各科成绩`, SUBJECTS, examsForName.map((ex) => SUBJECTS.map((s) => byNameExam[name][ex][s]), ), examsForName, SUBJECTS.map(() => "score"), TICK_SCORE_STEP_SUBJECTS, ); const summaryCats = [KEY_TOTAL, KEY_TOTAL_CLASS_RANK]; drawBarChart( containerSummary, `${name} - 总分排名`, summaryCats, examsForName.map((ex) => [ byNameExam[name][ex][KEY_TOTAL], byNameExam[name][ex][KEY_TOTAL_CLASS_RANK], ]), examsForName, ["score", "rank"], TICK_SCORE_STEP_SUMMARY, ); const warnings = examsForName.length ? [] : ["该学生暂无考试记录"]; document.getElementById("statusBar").innerHTML = warnings .map((w) => `<span class="warn badge">${w}</span>`) .join(" "); } function drawBarChart( container, title, cats, series, seriesNames, types, tickStep, ) { const w = container.clientWidth, h = container.clientHeight; if (w < 100) return; const margin = { t: 80, r: 40, b: 50, l: 50 }, iw = w - margin.l - margin.r, ih = h - margin.t - margin.b; const scoreIndices = cats.map((_, i) => i).filter(i => types[i] === "score"); const yMax = scoreIndices.length ? Math.max(...scoreIndices.map(i => FULL_MARKS[cats[i]] || 100)) : 1000; let html = `<svg width="${w}" height="${h}" xmlns="${NS_SVG}">`; html += `<text x="${w / 2}" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">${title}</text>`; seriesNames.forEach((sn, i) => { const lx = margin.l + i * 90; const ly = 50; html += `<rect x="${lx}" y="${ly}" width="12" height="12" fill="${COLOR_PALETTE[i % 4]}" rx="2" />`; html += `<text x="${lx + 18}" y="${ly + 10}" font-size="12" fill="#666">${sn}</text>`; }); for (let v = 0; v <= yMax; v += tickStep) { const yLine = Math.round(h - margin.b - (v / yMax) * ih); html += `<line x1="${margin.l}" y1="${yLine}" x2="${w - margin.r}" y2="${yLine}" stroke="${v === 0 ? "#bbb" : "#eee"}" stroke-width="1" />`; html += `<text x="${margin.l - 10}" y="${yLine + 4}" text-anchor="end" font-size="11" fill="#888">${v}</text>`; } html += `<line x1="${margin.l}" y1="${margin.t}" x2="${margin.l}" y2="${h - margin.b}" stroke="#bbb" />`; const groupStep = iw / cats.length; const groupW = groupStep * 0.8; const n = series.length; const innerGap = 2; const barW = (groupW - (n - 1) * innerGap) / n; cats.forEach((cat, i) => { const isScore = types[i] === "score"; const fm = FULL_MARKS[cat] || 100; const groupX = margin.l + i * groupStep + (groupStep - groupW) / 2; if (isScore) { const bgH = (fm / yMax) * ih; html += `<rect x="${groupX}" y="${h - margin.b - bgH}" width="${groupW}" height="${bgH}" fill="#f3f4f6" rx="2" />`; } series.forEach((s, si) => { const val = s[i] || 0; let barH; if (isScore) { barH = (val / yMax) * ih; } else { const maxRank = Math.max(...records.map((r) => r[KEY_TOTAL_CLASS_RANK]), 1); barH = (val / maxRank) * ih; } const x = groupX + si * (barW + innerGap); const y = h - margin.b - barH; html += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${COLOR_PALETTE[si % 4]}" rx="1" />`; const highlight = isScore && val > fm * SCORE_HIGHLIGHT_RATIO; html += `<text x="${x + barW / 2}" y="${y - 5}" text-anchor="middle" font-size="11" font-weight="${highlight ? "bold" : "normal"}" fill="${highlight ? COLOR_SCORE_HIGHLIGHT : "#333"}">${val}</text>`; }); html += `<text x="${margin.l + i * groupStep + groupStep / 2}" y="${h - 15}" text-anchor="middle" font-size="13" fill="#444">${cat}</text>`; }); html += "</svg>"; container.innerHTML = html; } try { init(); } catch (e) { console.error(e); }</script></body> </html>
